<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليدر بورد – الطحان جولدن داتس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b8860b;
    --gold-light: #d4a017;
    --gold-dark: #8a6200;
    --dark: #e8f4fd;
    --dark2: #ffffff;
    --dark3: #dceef9;
    --dark4: #c5e0f5;
    --text: #1a2a3a;
    --text-dim: #5a7a9a;
    --green: #1a7a4a;
    --red: #c0392b;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG EFFECT */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(184,134,11,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(21,101,192,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  .header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 32px 24px 20px;
    background: linear-gradient(180deg, var(--dark2) 0%, transparent 100%);
    border-bottom: 1px solid rgba(184,134,11,0.25);
  }
  .logo { font-size: 2rem; margin-bottom: 6px; }
  .header h1 { font-size: 1.5rem; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
  .header .sub { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }
  .auto-update { font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; }

  /* SUMMARY BAR */
  .summary {
    position: relative; z-index: 1;
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 16px 20px;
    flex-wrap: wrap;
  }
  .sum-item {
    background: var(--dark2);
    border: 1px solid rgba(184,134,11,0.3);
    border-radius: 10px;
    padding: 10px 20px;
    text-align: center;
    min-width: 120px;
  }
  .sum-item .val { font-size: 1.3rem; font-weight: 900; color: var(--gold); }
  .sum-item .lbl { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }

  /* OVERALL PROGRESS */
  .overall-progress {
    position: relative; z-index: 1;
    margin: 0 20px 20px;
    background: var(--dark2);
    border: 1px solid rgba(184,134,11,0.25);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .overall-label { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
  .overall-label strong { color: var(--gold); }
  .big-bar { background: var(--dark4); border-radius: 10px; height: 12px; overflow: hidden; }
  .big-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); transition: width 1s ease; position: relative; }
  .big-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 2s infinite; }
  @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

  /* GROUPS */
  .section-title {
    position: relative; z-index: 1;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 0 20px;
    margin-bottom: 12px;
  }

  /* LEADERBOARD */
  .leaderboard {
    position: relative; z-index: 1;
    padding: 0 16px;
    margin-bottom: 30px;
  }
  .rep-card {
    background: var(--dark2);
    border: 1px solid rgba(21,101,192,0.08);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.3s;
    animation: fadeIn 0.4s ease both;
  }
  .rep-card:hover { border-color: rgba(201,168,76,0.3); transform: translateX(-2px); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* RANK */
  .rank {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1rem;
    flex-shrink: 0;
    background: var(--dark4);
    color: var(--text-dim);
  }
  .rank.r1 { background: linear-gradient(135deg, #b8860b, #ffd700); color: #000; font-size: 1.2rem; }
  .rank.r2 { background: linear-gradient(135deg, #555, #aaa); color: #000; }
  .rank.r3 { background: linear-gradient(135deg, #6b3a1f, #cd7f32); color: #fff; }

  /* INFO */
  .rep-info { flex: 1; min-width: 0; }
  .rep-name { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
  .rep-group { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 6px; }
  .rep-bar { background: var(--dark4); border-radius: 6px; height: 6px; overflow: hidden; }
  .rep-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); transition: width 0.8s ease; }
  .rep-bar-fill.over { background: linear-gradient(90deg, #1a5a35, var(--green)); }

  /* NUMBERS */
  .rep-nums { text-align: left; flex-shrink: 0; }
  .rep-achieved { font-size: 1.1rem; font-weight: 900; color: var(--gold); }
  .rep-pct { font-size: 0.8rem; margin-top: 2px; }
  .rep-pct.over { color: var(--green); }
  .rep-pct.mid { color: var(--gold); }
  .rep-pct.low { color: var(--red); }

  /* TROPHY */
  .trophy { position: absolute; left: 16px; font-size: 1.2rem; opacity: 0; transition: opacity 0.3s; }
  .rep-card:hover .trophy { opacity: 1; }

  /* REFRESH */
  .refresh-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--dark3), var(--dark4));
    border: 1px solid var(--gold-dark);
    border-radius: 30px;
    padding: 10px 24px;
    color: var(--gold);
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: all 0.2s;
  }
  .refresh-btn:hover { background: var(--dark4); }

  /* SETUP */
  .setup-msg {
    position: relative; z-index: 1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .setup-msg h3 { color: var(--gold); margin-bottom: 12px; }
  .setup-msg p { font-size: 0.9rem; line-height: 1.8; }

  /* GROUP HEADER */
  .group-header {
    position: relative; z-index: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px 8px;
    margin-bottom: 4px;
  }
  .group-header .gname { font-weight: 700; font-size: 0.95rem; color: var(--gold); }
  .group-header .gstats { font-size: 0.78rem; color: var(--text-dim); }
  .group-bar-mini { flex: 1; background: var(--dark4); border-radius: 4px; height: 4px; overflow: hidden; }
  .group-bar-fill { height: 100%; border-radius: 4px; background: var(--gold-dark); }

  /* LAST UPDATE */
  .last-update { text-align: center; color: var(--text-dim); font-size: 0.75rem; padding: 8px; position: relative; z-index: 1; }

  /* LOADING */
  .loading { text-align: center; padding: 60px; color: var(--text-dim); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--dark4); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏆</div>
  <h1 id="boardTitle">ليدر بورد المبيعات</h1>
  <div class="sub" id="boardSub">جاري التحميل...</div>
  <div class="auto-update">🔄 يتحدث تلقائياً كل 5 دقائق</div>
</div>

<div id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    <div>جاري تحميل البيانات...</div>
  </div>
</div>

<button class="refresh-btn" onclick="loadData()">🔄 تحديث الآن</button>

<script>
const DEFAULT_SHEET_URL = 'https://script.google.com/macros/s/AKfycbysHDhQlFFRrK0QgWkb4o3QBuyCoqbeXxJu5XBvRh1G32Y3jjcGbXdZSHac4zj3bl0MTQ/exec';
const SHEET_URL = localStorage.getItem('sheetUrl') || DEFAULT_SHEET_URL;
let refreshTimer;

async function loadData() {
  if (!SHEET_URL) {
    showSetupMsg();
    return;
  }
  try {
    const res = await fetch(SHEET_URL + '?action=getData');
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="setup-msg">
        <h3>⚠️ خطأ في الاتصال</h3>
        <p>تأكد من صحة رابط Google Sheets في لوحة التحكم</p>
        <p style="margin-top:8px;font-size:0.8rem;color:var(--red)">${e.message}</p>
      </div>`;
  }
}

function showSetupMsg() {
  document.getElementById('mainContent').innerHTML = `
    <div class="setup-msg">
      <h3>⚙️ لم يتم الربط بعد</h3>
      <p>افتح <strong>لوحة التحكم (admin.html)</strong><br>وأدخل رابط Google Sheets للبدء</p>
      <p style="margin-top:16px;font-size:0.8rem">ثم أعد تحميل هذه الصفحة</p>
    </div>`;
}

function fmt(n) { return Number(n || 0).toLocaleString('en-US'); }
function pct(a, t) { if (!t || t == 0) return 0; return Math.round((a / t) * 100); }

function render(data) {
  const { reps = [], groups = [], sectors = [], settings = {}, competitions = [] } = data;

  // Header
  const months = ['','يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const monthName = months[settings.month] || '';
  document.getElementById('boardTitle').textContent = `ليدر بورد المبيعات`;
  document.getElementById('boardSub').textContent = `${settings.company || 'الطحان جولدن داتس'} — ${monthName} ${settings.year || ''}`;

  const totalAch = reps.reduce((s, r) => s + Number(r.achieved || 0), 0);
  const totalTgt = reps.reduce((s, r) => s + Number(r.target || 0), 0);
  const overCount = reps.filter(r => Number(r.achieved || 0) >= Number(r.target || 0)).length;
  const totalPct = pct(totalAch, totalTgt);

  let html = '';

  // Summary
  html += `<div class="summary">
    <div class="sum-item"><div class="val">${fmt(totalAch)} ج</div><div class="lbl">📊 الإجمالي</div></div>
    <div class="sum-item"><div class="val">${totalPct}%</div><div class="lbl">🎯 نسبة القطاع</div></div>
    <div class="sum-item"><div class="val">${overCount}</div><div class="lbl">🏆 تجاوزوا الهدف</div></div>
    <div class="sum-item"><div class="val">${settings.remainingDays ?? '-'}</div><div class="lbl">📅 أيام متبقية</div></div>
  </div>`;

  // Active Competitions
  const activeComps = (data.competitions||[]).filter(c=>c.active==='1');
  if(activeComps.length){
    const today=new Date();
    const running=activeComps.filter(c=>{
      const end=c.endDate?new Date(c.endDate):null;
      const start=c.startDate?new Date(c.startDate):null;
      return (!end||today<=end)&&(!start||today>=start);
    });
    if(running.length){
      html+=`<div style="margin:0 16px 16px">`;
      running.forEach(c=>{
        const end=c.endDate?new Date(c.endDate):null;
        const daysLeft=end?Math.ceil((end-today)/(1000*60*60*24)):null;
        html+=`<div style="background:linear-gradient(135deg,#fff8e1,#fff3cd);border:2px solid #b8860b;border-radius:14px;padding:14px 18px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px">
            <div>
              <div style="font-size:1rem;font-weight:900;color:#8a6200">🏅 ${c.name}</div>
              <div style="font-size:.8rem;color:#5a7a9a;margin-top:3px">📋 ${c.condition}</div>
              <div style="font-size:.82rem;color:#1a7a4a;font-weight:700;margin-top:4px">🎁 ${c.reward}</div>
            </div>
            ${daysLeft!==null?`<div style="text-align:center;background:#b8860b;color:#fff;border-radius:10px;padding:6px 12px"><div style="font-size:1.2rem;font-weight:900">${daysLeft}</div><div style="font-size:.7rem">يوم متبقي</div></div>`:''}
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
  }

  // Overall progress
  html += `<div class="overall-progress">
    <div class="overall-label">
      <span>التقدم الكلي للقطاع</span>
      <strong>${totalPct}%</strong>
    </div>
    <div class="big-bar">
      <div class="big-fill" style="width:${Math.min(totalPct,100)}%"></div>
    </div>
  </div>`;

  // Sort reps by achieved desc
  const sorted = [...reps].sort((a, b) => Number(b.achieved || 0) - Number(a.achieved || 0));

  if (sectors && sectors.length > 0) {
    // Hierarchical: Sector -> Groups -> Reps
    sectors.forEach(sec => {
      const secReps = sorted.filter(r => r.sector === sec.name);
      if (!secReps.length) return;
      const secAch = secReps.reduce((s, r) => s + Number(r.achieved || 0), 0);
      const secTgt = secReps.reduce((s, r) => s + Number(r.target || 0), 0);
      const secP = pct(secAch, secTgt);

      // Sector header
      html += `<div style="margin:16px 16px 8px;background:linear-gradient(135deg,#fff8e1,#fff3cd);border:2px solid #b8860b;border-radius:14px;padding:14px 18px">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px">
          <span style="font-size:1.1rem;font-weight:900;color:#8a6200">🏭 ${sec.name}</span>
          <span style="font-size:.85rem;color:#5a7a9a">${secReps.length} مندوب | ${fmt(secAch)} ج | <strong style="color:${secP>=100?'#1a7a4a':'#b8860b'}">${secP}%</strong></span>
        </div>
        <div style="background:#c5e0f5;border-radius:8px;height:7px;overflow:hidden">
          <div style="height:100%;border-radius:8px;background:linear-gradient(90deg,#8a6200,#d4a017);width:${Math.min(secP,100)}%"></div>
        </div>
      </div>`;

      // Groups inside sector
      const secGroups = groups.filter(g => g.sector === sec.name);
      if (secGroups.length > 0) {
        secGroups.forEach(g => {
          const grpReps = secReps.filter(r => r.group === g.name);
          if (!grpReps.length) return;
          const gAch = grpReps.reduce((s, r) => s + Number(r.achieved || 0), 0);
          const gTgt = grpReps.reduce((s, r) => s + Number(r.target || 0), 0);
          const gPct = pct(gAch, gTgt);
          html += `<div class="group-header">
            <span class="gname">🏢 ${g.name}</span>
            <div class="group-bar-mini"><div class="group-bar-fill" style="width:${Math.min(gPct,100)}%"></div></div>
            <span class="gstats">${gPct}% | ${fmt(gAch)} ج</span>
          </div>`;
          html += `<div class="leaderboard">${grpReps.map((r, i) => repCard(r, i, grpReps)).join('')}</div>`;
        });
        // Reps in sector but no group
        const noGrp = secReps.filter(r => !r.group);
        if (noGrp.length) {
          html += `<div class="group-header"><span class="gname">👤 بدون مجموعة</span></div>`;
          html += `<div class="leaderboard">${noGrp.map((r, i) => repCard(r, i, noGrp)).join('')}</div>`;
        }
      } else {
        // No groups, show reps directly
        html += `<div class="leaderboard">${secReps.map((r, i) => repCard(r, i, secReps)).join('')}</div>`;
      }
    });

    // Reps without sector
    const noSec = sorted.filter(r => !r.sector);
    if (noSec.length) {
      html += `<div style="margin:16px 16px 8px;font-weight:900;color:#5a7a9a;font-size:.9rem;padding:8px 4px">👤 بدون قطاع</div>`;
      html += `<div class="leaderboard">${noSec.map((r, i) => repCard(r, i, noSec)).join('')}</div>`;
    }

  } else if (groups.length > 0) {
    // No sectors, show by groups
    groups.forEach(g => {
      const grpReps = sorted.filter(r => r.group === g.name);
      if (!grpReps.length) return;
      const gAch = grpReps.reduce((s, r) => s + Number(r.achieved || 0), 0);
      const gTgt = grpReps.reduce((s, r) => s + Number(r.target || 0), 0);
      const gPct = pct(gAch, gTgt);
      html += `<div class="group-header">
        <span class="gname">🏢 ${g.name}</span>
        <div class="group-bar-mini"><div class="group-bar-fill" style="width:${Math.min(gPct,100)}%"></div></div>
        <span class="gstats">${gPct}% | ${fmt(gAch)} ج</span>
      </div>`;
      html += `<div class="leaderboard">${grpReps.map((r, i) => repCard(r, i, grpReps)).join('')}</div>`;
    });
    const ungrouped = sorted.filter(r => !r.group);
    if (ungrouped.length) {
      html += `<div class="group-header"><span class="gname">👤 بدون مجموعة</span></div>`;
      html += `<div class="leaderboard">${ungrouped.map((r, i) => repCard(r, i, ungrouped)).join('')}</div>`;
    }
  } else {
    html += `<div class="leaderboard">${sorted.map((r, i) => repCard(r, i, sorted)).join('')}</div>`;
  }

  html += `<div class="last-update">آخر تحديث: ${new Date().toLocaleTimeString('ar-EG', {hour:'2-digit',minute:'2-digit'})}</div>`;

  document.getElementById('mainContent').innerHTML = html;
}

function repCard(r, i, allInGroup) {
  const rank = allInGroup.indexOf(r) + 1; // rank within group or overall
  const globalRank = i + 1;
  const p = pct(r.achieved, r.target);
  const rankClass = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
  const rankLabel = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
  const pctClass = p >= 100 ? 'over' : p >= 70 ? 'mid' : 'low';
  const barClass = p >= 100 ? 'over' : '';
  const delay = (i * 60) + 'ms';

  return `<div class="rep-card" style="animation-delay:${delay}">
    <div class="rank ${rankClass}">${rankLabel}</div>
    <div class="rep-info">
      <div class="rep-name">${r.name}</div>
      ${r.group ? `<div class="rep-group">${r.group}</div>` : ''}
      <div class="rep-bar">
        <div class="rep-bar-fill ${barClass}" style="width:${Math.min(p,100)}%"></div>
      </div>
    </div>
    <div class="rep-nums">
      <div class="rep-achieved">${fmt(r.achieved)} ج</div>
      <div class="rep-pct ${pctClass}">${p}% ${p >= 100 ? '✅' : ''}</div>
    </div>
  </div>`;
}

// Auto refresh every 5 min
function startAutoRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(loadData, 5 * 60 * 1000);
}

loadData();
startAutoRefresh();
</script>
</body>
</html>
